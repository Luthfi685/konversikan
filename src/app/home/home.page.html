<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-title>Konversikan</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="themeService.toggleTheme()">
        <ion-icon [name]="themeService.getDarkMode() ? 'sunny-outline' : 'moon-outline'"></ion-icon>
      </ion-button>
      <ion-button routerLink="/profile" class="profile-btn">
        <ion-icon name="person-circle-outline" style="font-size: 28px;"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- Decorative Background Elements -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="main-container">
    <div class="header-section">
      <h2 style="margin-bottom: 5px; font-weight: 600; font-size: 1.4rem; color: var(--app-text);" *ngIf="userName">Halo, {{ userName }}! 👋</h2>
      <h1 [style.marginTop]="userName ? '0' : ''">Pilih Kategori</h1>
      <p>Konversi apapun dalam satu genggaman</p>
    </div>

    <ion-grid>
      <ion-row>
        <ion-col size="6" *ngFor="let cat of categories">
          <div class="category-card" [routerLink]="['/converter']" [queryParams]="{ type: cat.id }">
            <div class="icon-wrapper" [style.background]="cat.color">
              <ion-icon [name]="cat.icon"></ion-icon>
            </div>
            <h3>{{ cat.name }}</h3>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
